{q:"Wie viele Personen kommen insgesamt?",o:["Zwei","Drei","Vier"],c:1},
{q:"Wer ist Anna?",o:["Jans Freundin","Die Schwester der Frau","Eine Kollegin"],c:1}
]},
{id:"a2-h2",type:"listen",title:"Teil 2: Radiodurchsage",

questions:[

],
schreiben:[

min:35,max:60}
],
wortschatz:[

{id:"a2-w2",type:"mc",title:"Grammatik: Perfekt und Nebensaetze",
instruction:"Waehlen Sie die richtige Form.",
questions:[

{q:"Ich bleibe zu Hause, ___ ich krank bin.",o:["denn","weil","aber"],c:1},

{q:"___ du schon gefruehstueckt?",o:["Bist","Hast","Wirst"],c:1},
{q:"Er sagt, ___ er morgen kommt.",o:["dass","weil","wenn"],c:0},
{q:"Wir haben uns ___, als wir Kinder waren.",o:["kennengelernt","kennenlernen","kennengelernen"],c:0},

};

var SN={lesen:"Lesen",hoeren:"Hoeren",schreiben:"Schreiben",wortschatz:"Wortschatz"};
var IC={lesen:"\u{1F4D6}",hoeren:"\u{1F3A7}",schreiben:"\u270D\uFE0F",wortschatz:"\u{1F524}"};

var S={screen:"home",level:null,sec:null,idx:0,ans:{},wrt:{},done:false,res:null,time:0,iv:null};

function fmt(s){var m=Math.floor(s/60),ss=s%60;return String(m).padStart(2,"0")+":"+String(ss).padStart(2,"0")}

function go(l,s){
  if(S.iv)clearInterval(S.iv);
  S={screen:"exam",level:l,sec:s,idx:0,ans:{},wrt:{},done:false,res:null,time:0,iv:null};
  S.iv=setInterval(function(){S.time++;var e=document.getElementById("tmr");if(e)e.textContent=fmt(S.time)},1000);
  R();
}

function home(){if(S.iv)clearInterval(S.iv);S={screen:"home",level:null,sec:null,idx:0,ans:{},wrt:{},done:false,res:null,time:0,iv:null};R()}
function ans(qi,v){S.ans[S.idx+"-"+qi]=v;R()}
function wrt(k,v){S.wrt[k]=v}
function next(){S.idx++;R();window.scrollTo(0,0)}
function prev(){S.idx--;R();window.scrollTo(0,0)}

function submit(){
  if(S.iv)clearInterval(S.iv);
  var ts=QB[S.level][S.sec],tot=0,cor=0;
  for(var t=0;t<ts.length;t++){
    var tk=ts[t];
    if(tk.type==="form"||tk.type==="free")continue;
    var qs=tk.questions||[];
    for(var q=0;q<qs.length;q++){tot++;if(S.ans[t+"-"+q]===qs[q].c)cor++}
  }
  S.done=true;S.res={tot:tot,cor:cor,pct:tot>0?Math.round(cor/tot*100):0};R();window.scrollTo(0,0);
}

function e(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}

function R(){
  var a=document.getElementById("app");
  if(S.screen==="home"){RH(a);return}
  if(S.done&&S.res){RR(a);return}
  RE(a);
}

function RH(a){
  var h='<div class="hdr"><div class="logo">G</div><h1 class="ttl">Goethe-Pr\u00fcfung</h1><p class="sub">\u00dcbungspr\u00fcfung A1 & A2</p></div>';
  var lvls=["A1","A2"];
  for(var i=0;i<lvls.length;i++){
    var l=lvls[i];
    h+='<div class="lc"><div class="lb"><span>'+l+'</span></div><h2 class="lt">Goethe-Zertifikat '+l+'</h2><div class="sg">';
    var secs=["lesen","hoeren","schreiben","wortschatz"];
    for(var j=0;j<secs.length;j++){
      var s=secs[j],cnt=QB[l][s].length;
      h+='<button class="sb" onclick="go(\''+l+'\',\''+s+'\')"><span class="si">'+IC[s]+'</span><span class="sn">'+SN[s]+'</span><span class="sc">'+cnt+' Aufgabe'+(cnt>1?'n':'')+'</span></button>';
    }
    h+='</div></div>';
  }
  h+='<div class="ft"><p>\u00dcbungsmaterial im Goethe-Pr\u00fcfungsformat.<br>Nicht offiziell vom Goethe-Institut.</p></div>';
  a.innerHTML=h;
}

function RE(a){
  var ts=QB[S.level][S.sec],tk=ts[S.idx],pr=((S.idx+1)/ts.length*100);
  var h='<div class="tb"><button class="bb" onclick="home()">\u2715</button><div class="ti"><span class="tl">'+S.level+'</span><span class="ts">'+SN[S.sec]+'</span></div><div class="tmr" id="tmr">'+fmt(S.time)+'</div></div>';
  h+='<div class="pc"><div class="pb" style="width:'+pr+'%"></div></div><div class="pt">Aufgabe '+(S.idx+1)+' von '+ts.length+'</div>';
  h+='<div class="tc"><h3 class="ttt">'+e(tk.title)+'</h3><p class="tin">'+e(tk.instruction)+'</p>';

  if(tk.type==="reading"){
    h+='<div class="pas">'+e(tk.passage)+'</div>';
    for(var i=0;i<tk.questions.length;i++){
      var q=tk.questions[i],k=S.idx+"-"+i,ua=S.ans[k];
      h+='<div class="rr"><span class="rq">'+e(q.q)+'</span><div class="rbs">';
      h+='<button class="rb'+(ua===true?' at':'')+'" onclick="ans('+i+',true)">Richtig</button>';
      h+='<button class="rb'+(ua===false?' af':'')+'" onclick="ans('+i+',false)">Falsch</button>';
      h+='</div></div>';
    }
  }

  if(tk.type==="mc"){
    for(var i=0;i<tk.questions.length;i++){
      var q=tk.questions[i],k=S.idx+"-"+i,ua=S.ans[k];
      h+='<div class="mb"><p class="mq">'+e(q.q)+'</p><div class="mos">';
      for(var j=0;j<q.o.length;j++){
        h+='<button class="mo'+(ua===j?' ac':'')+'" onclick="ans('+i+','+j+')"><span class="ol">'+String.fromCharCode(65+j)+'</span>'+e(q.o[j])+'</button>';
      }
      h+='</div></div>';
    }
  }

  if(tk.type==="listen"){
    h+='<div class="db"><div class="dh">\u{1F3A7} Hoertext (Simulation)</div>';
    var lines=tk.dialogue.split("\n");
    for(var i=0;i<lines.length;i++)h+='<p class="dl">'+e(lines[i])+'</p>';
    h+='</div>';
    for(var i=0;i<tk.questions.length;i++){
      var q=tk.questions[i],k=S.idx+"-"+i,ua=S.ans[k];
      h+='<div class="mb"><p class="mq">'+e(q.q)+'</p><div class="mos">';
      for(var j=0;j<q.o.length;j++){
        h+='<button class="mo'+(ua===j?' ac':'')+'" onclick="ans('+i+','+j+')"><span class="ol">'+String.fromCharCode(65+j)+'</span>'+e(q.o[j])+'</button>';
      }
      h+='</div></div>';
    }
  }

  if(tk.type==="form"){
    h+='<div style="display:flex;flex-direction:column;gap:14px">';
    for(var i=0;i<tk.fields.length;i++){
      var f=tk.fields[i],k=S.idx+"-"+i,v=S.wrt[k]||"";
      h+='<div><label class="fl">'+e(f.l)+'</label><input class="fi" placeholder="'+e(f.p)+'" value="'+e(v)+'" oninput="wrt(\''+k+'\',this.value)"></div>';
    }
    h+='</div>';
  }

  if(tk.type==="free"){
    h+='<ul class="pl">';
    for(var i=0;i<tk.points.length;i++)h+='<li>'+e(tk.points[i])+'</li>';
    h+='</ul>';
    var tk2=S.idx+"-text",tv=S.wrt[tk2]||"",wc=tv.split(/\s+/).filter(Boolean).length;
    h+='<textarea class="ta" rows="6" placeholder="Schreiben Sie hier..." oninput="wrt(\''+tk2+'\',this.value)">'+e(tv)+'</textarea>';
    h+='<div class="wc">'+wc+' Woerter'+(tk.min?' (min. '+tk.min+')':'')+'</div>';
  }

  h+='</div>';
  h+='<div class="nr"><button class="nb" '+(S.idx===0?'disabled':'')+' onclick="prev()">\u2190 Zurueck</button>';
  if(S.idx<ts.length-1){h+='<button class="nb pr" onclick="next()">Weiter \u2192</button>'}
  else{h+='<button class="nb su" onclick="submit()">Abgeben \u2713</button>'}
  h+='</div>';
  a.innerHTML=h;
}

function RR(a){
  var r=S.res,iw=S.sec==="schreiben",ts=QB[S.level][S.sec];
  var h='<div class="rc"><div class="re">'+(r.pct>=60?'\u{1F389}':r.pct>=40?'\u{1F4AA}':'\u{1F4DA}')+'</div>';
  h+='<h2 class="rtt">Ergebnis</h2><div class="rl">'+S.level+' \u2013 '+SN[S.sec]+'</div><div class="tr">\u23F1 '+fmt(S.time)+'</div>';

  if(!iw){
    var bc=r.pct>=60?"#2d8a4e":r.pct>=40?"#b8860b":"#c0392b";
    h+='<div style="text-align:center"><span class="sp">'+r.pct+'%</span><span class="sd">'+r.cor+'/'+r.tot+'</span></div>';
    h+='<div class="rbr"><div class="rbf" style="width:'+r.pct+'%;background:'+bc+'"></div></div>';
    h+='<p class="rm">'+(r.pct>=60?'Bestanden! Sehr gut gemacht! \u{1F31F}':r.pct>=40?'Knapp! Noch ein bisschen ueben. \u{1F4AA}':'Nicht bestanden. Weiter ueben! \u{1F4D6}')+'</p>';
    h+='<h3 class="rvt">Antworten ueberpruefen</h3>';
    for(var t=0;t<ts.length;t++){
      var tk=ts[t];
      if(tk.type==="form"||tk.type==="free")continue;
      h+='<div class="rvb"><h4>'+e(tk.title)+'</h4>';
      for(var q=0;q<tk.questions.length;q++){
        var qu=tk.questions[q],k=t+"-"+q,ua=S.ans[k],ic=ua===qu.c;
        var brd=ic?"#2d8a4e":ua!==undefined?"#c0392b":"#999";
        var sym=ic?"\u2713":ua!==undefined?"\u2717":"\u2014";
        var syc=ic?"#2d8a4e":"#c0392b";
        h+='<div class="rvi" style="border-left:3px solid '+brd+'"><span>'+e(qu.q)+'</span><span class="rvs" style="color:'+syc+'">'+sym+'</span></div>';
      }
      h+='</div>';
    }
  } else {
    h+='<p class="wn">\u270D\uFE0F Schreiben wird nicht automatisch bewertet.<br>Ueberpruefen Sie Ihre Texte selbst oder bitten Sie einen Lehrer um Feedback.</p>';
    for(var t=0;t<ts.length;t++){
      var tk=ts[t];
      h+='<div class="wb"><h4>'+e(tk.title)+'</h4>';
      if(tk.type==="form"){
        for(var f=0;f<tk.fields.length;f++){
          var v=S.wrt[t+"-"+f]||"\u2014";
          h+='<div class="wfr"><span class="lbl">'+e(tk.fields[f].l)+':</span><span>'+e(v)+'</span></div>';
        }
      }
      if(tk.type==="free"){
        var v=S.wrt[t+"-text"]||"\u2014 Kein Text \u2014";
        h+='<p class="wtr">'+e(v)+'</p>';
      }
      h+='</div>';
    }
  }
  h+='<button class="hb" onclick="home()">\u2190 Zurueck zur Startseite</button></div>';
  a.innerHTML=h;
}

R();
if("serviceWorker"in navigator){navigator.serviceWorker.register("sw.js").catch(function(){})}
</script>
